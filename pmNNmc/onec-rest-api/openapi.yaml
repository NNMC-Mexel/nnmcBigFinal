openapi: 3.0.3
info:
  title: NNMC 1C Integration API
  version: 1.0.0
paths:
  /hs/nnmc/v1/employees:
    get:
      summary: Employees present in a conducted timesheet
      security:
        - basicAuth: []
      parameters:
        - in: query
          name: department
          required: true
          schema:
            type: string
        - in: query
          name: year
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
        - in: query
          name: month
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 1000
      responses:
        "200":
          description: Employee list
          content:
            application/json:
              schema:
                type: object
                required: [items, meta]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Employee"
                  meta:
                    type: object
        "400":
          description: Invalid request
        "401":
          description: 1C authentication failed
        "500":
          description: Internal 1C error
  /hs/nnmc/v1/timesheets:
    get:
      summary: Conducted timesheets for a department and month
      security:
        - basicAuth: []
      parameters:
        - in: query
          name: department
          required: true
          schema:
            type: string
        - in: query
          name: year
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
        - in: query
          name: month
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 500
      responses:
        "200":
          description: Timesheet list
          content:
            application/json:
              schema:
                type: object
                required: [items, meta]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Timesheet"
                  meta:
                    type: object
        "400":
          description: Invalid request
        "401":
          description: 1C authentication failed
        "500":
          description: Internal 1C error
  /hs/nnmc/v1/timesheet:
    get:
      summary: A conducted timesheet with employee day values
      security:
        - basicAuth: []
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Timesheet details
          content:
            application/json:
              schema:
                type: object
                required: [timesheet, employees]
                properties:
                  timesheet:
                    $ref: "#/components/schemas/Timesheet"
                  employees:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimesheetEmployee"
        "400":
          description: Invalid request
        "401":
          description: 1C authentication failed
        "404":
          description: Timesheet not found
        "500":
          description: Internal 1C error
  /hs/nnmc/v1/kpi-accruals:
    post:
      summary: Create an unposted KPI one-time accrual document
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [year, month, organization, department, accrual, idempotencyKey, employees]
              properties:
                year:
                  type: integer
                month:
                  type: integer
                  minimum: 1
                  maximum: 12
                organization:
                  type: string
                department:
                  type: string
                accrual:
                  type: string
                  example: KPI
                idempotencyKey:
                  type: string
                submittedBy:
                  type: string
                employees:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [fio, amount]
                    properties:
                      fio:
                        type: string
                      amount:
                        type: number
                        exclusiveMinimum: 0
      responses:
        "201":
          description: Unposted document created
        "400":
          description: Invalid request
        "401":
          description: 1C authentication failed
        "409":
          description: Document already exists
        "422":
          description: 1C reference or employee could not be resolved
        "500":
          description: Internal 1C error
  /hs/nnmc/v1/vacation-requests:
    post:
      summary: Create an unposted vacation document from BPM
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VacationRequest"
      responses:
        "201":
          description: Unposted vacation document created
        "200":
          description: Existing document returned for duplicate requestNumber
        "400":
          description: Invalid request
        "401":
          description: 1C authentication failed
        "422":
          description: 1C reference or employee could not be resolved
        "500":
          description: Internal 1C error
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    Employee:
      type: object
      required: [id, fio, department, active]
      properties:
        id:
          type: string
          format: uuid
        fio:
          type: string
        departmentId:
          type: string
        department:
          type: string
        positionId:
          type: string
        position:
          type: string
        categoryId:
          type: string
        category:
          type: string
        organization:
          type: string
        active:
          type: boolean
    Timesheet:
      type: object
      required: [id, date, number, period, department, dateFrom, dateTo, conducted]
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        number:
          type: string
        period:
          type: string
          format: date-time
        organization:
          type: string
        department:
          type: string
        dateFrom:
          type: string
          format: date-time
        dateTo:
          type: string
          format: date-time
        conducted:
          type: boolean
    TimesheetEmployee:
      type: object
      required: [fio, position, category, days]
      properties:
        fio:
          type: string
        position:
          type: string
        category:
          type: string
        days:
          type: array
          minItems: 31
          maxItems: 31
          items:
            oneOf:
              - type: number
              - type: string
    VacationRequest:
      type: object
      required: [requestNumber, employee, vacation]
      properties:
        documentForm:
          type: string
          example: Документ.ОтпускаСотрудников.Форма.ФормаДокумента
        source:
          type: string
          example: NNMC BPM
        requestNumber:
          type: string
          example: BPM-2026-000001
        employee:
          type: object
          required: [employeeId, fio, organization]
          properties:
            employeeId:
              type: string
              format: uuid
            iin:
              type: string
            fio:
              type: string
            personnelNumber:
              type: string
            position:
              type: string
            departmentId:
              type: string
              format: uuid
            department:
              type: string
            organizationId:
              type: string
              format: uuid
            organization:
              type: string
        manager:
          type: object
          properties:
            name:
              type: string
            position:
              type: string
            department:
              type: string
        vacation:
          type: object
          required: [type, startDate, endDate, calendarDays]
          properties:
            type:
              type: string
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
            calendarDays:
              type: integer
            replacementEmployeeName:
              type: string
            comment:
              type: string
